<!DOCTYPE html>
<html>
<head>
    <title>Backend Test</title>
</head>
<body>
    <h1>Test Backend Configuration</h1>
    <button onclick="testBackend()">Test Backend</button>
    <pre id="result"></pre>
    
    <script>
        async function testBackend() {
            const result = document.getElementById('result');
            result.textContent = 'Testing...';
            
            try {
                const response = await fetch('https://ghost-phantom-navy.vercel.app/api/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        code: 'test_code_12345',
                        redirect_uri: 'https://bryceshaw13.github.io/ghost-phantom/'
                    })
                });
                
                const data = await response.json();
                
                result.textContent = `Status: ${response.status}\n\n` + 
                                    `Response:\n${JSON.stringify(data, null, 2)}`;
                
            } catch (error) {
                result.textContent = `Error: ${error.message}\n\n${error.stack}`;
            }
        }
    </script>
</body>
</html>
